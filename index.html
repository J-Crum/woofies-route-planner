// Google Sheets configuration
const SHEET_ID = '1-m1rWknWWgjblm3cB9DvbeLueIYUwi4A63npEafyVSk';
const API_KEY = 'AIzaSyCszqzMWTZQs9VKgS4QAfR-tdMwxdwdx4U';
const RANGE = 'Woofies-Castlerock_Clients-All-Time-January-1-1900-to-January-1-3000-by-Zip-Code_2026-03-09!A:M';

window.CUSTOMERS = [];

// Load customer data from Google Sheets
async function loadCustomerData() {
  try {
    console.log('📊 Loading customer data from Google Sheets...');
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;
    
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    
    const data = await response.json();
    const rows = data.values;
    
    if (!rows || rows.length === 0) {
      console.error('❌ No data found in sheet');
      return;
    }
    
    // Parse header row
    const headers = rows[0];
    console.log('📋 Sheet columns:', headers);
    
    // Find column indices
    const colIdx = {};
    headers.forEach((header, idx) => {
      colIdx[header.trim()] = idx;
    });
    
    // Parse data rows
    window.CUSTOMERS = [];
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      
      // Only include successfully geocoded customers
      if (row[colIdx['Status']] === 'SUCCESS' && row[colIdx['Latitude']] && row[colIdx['Longitude']]) {
        CUSTOMERS.push({
          id: row[colIdx['ID']],
          name: `${row[colIdx['First Name']] || ''} ${row[colIdx['Last Name']] || ''}`.trim(),
          firstName: row[colIdx['First Name']] || '',
          lastName: row[colIdx['Last Name']] || '',
          type: row[colIdx['Client Type']],
          lat: parseFloat(row[colIdx['Latitude']]),
          lng: parseFloat(row[colIdx['Longitude']]),
          neighborhood: row[colIdx['Assigned Neighborhood']] || '',
          region: row[colIdx['Neighborhood Region']] || '',
          address: row[colIdx['Geocoded Address']] || row[colIdx['Full Address']] || ''
        });
      }
    }
    
    console.log(`✅ Loaded ${CUSTOMERS.length} customers from Google Sheets`);
    
    // Initialize the app after data is loaded
    if (typeof initMap === 'function') {
      initMap();
      buildNeighborhoodList();
      updateCustomerCount();
    }
    
  } catch (error) {
    console.error('❌ Error loading customer data:', error);
    document.getElementById('customer-count').innerHTML = `
      <div style="color: #d32f2f; padding: 10px; background: #ffebee; border-radius: 4px; margin: 10px;">
        <strong>Error loading customer data</strong><br>
        ${error.message}<br>
        <small>Check console for details</small>
      </div>
    `;
  }
}
</script>

// ============== UTILITY FUNCTIONS ==============
function calculateDistance(lat1, lng1, lat2, lng2) {
  const R = 3959; // Earth radius in miles
  const toRad = (deg) => deg * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function findNearestNeighborhood(lat, lng) {
  let nearest = null;
  let minDistance = Infinity;
  
  NEIGHBORHOODS.forEach(nhood => {
    const dist = calculateDistance(nhood.lat, nhood.lng, lat, lng);
    if (dist < minDistance) {
      minDistance = dist;
      nearest = nhood;
    }
  });
  
  return {
    name: nearest.name,
    region: nearest.region,
    distance: minDistance
  };
}

async function geocodeAddress(address) {
  try {
    const response = await fetch(
      `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${GOOGLE_API_KEY}`
    );
    const data = await response.json();
    
    if (data.status === 'OK' && data.results.length > 0) {
      return {
        lat: data.results[0].geometry.location.lat,
        lng: data.results[0].geometry.location.lng,
        formatted: data.results[0].formatted_address
      };
    } else {
      throw new Error(data.status);
    }
  } catch (error) {
    console.error('Geocoding error:', error);
    throw error;
  }
}

function initMap() {

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

      className: 'hq-marker',

      iconSize: [32, 32]
    })
  }).addTo(map).bindPopup('<strong>Woofies HQ</strong><br>201 S Wilcox St<br>Castle Rock, CO');
  
  // Add distance rings
  [1, 3, 5, 10, 15, 20].forEach((radius, i) => {
    const colors = ['#C62828', '#D46A00', '#2E7D32', '#1565C0', '#9C27B0', '#424242'];
    L.circle(HQ, {
      radius: radius * 1609.34,
      color: colors[i],
      fillColor: colors[i],
      fillOpacity: 0.05,
      weight: 2,
      dashArray: '5, 5'
    }).addTo(map);
  });
  
  // Add neighborhood markers
  NEIGHBORHOODS.forEach(n => {
    const color = REGION_COLORS[n.region];
    const distance = calculateDistance(HQ[0], HQ[1], n.lat, n.lng);
    
    // Distance-based opacity
    let opacity = 0.3 + Math.min(distance / 20, 0.7);
    
    L.circleMarker([n.lat, n.lng], {
      radius: 5,
      fillColor: color,
      color: 'white',
      weight: 1,
      fillOpacity: opacity
    }).addTo(map).bindPopup(`<strong>${n.name}</strong><br>${n.region}<br>${distance.toFixed(1)} mi from HQ`);
  });
}

// ============== ADDRESS LOOKUP ==============
async function lookupAddress() {
  const input = document.getElementById('addressInput');
  const resultDiv = document.getElementById('addressResult');
  const address = input.value.trim();
  
  if (!address) {
    resultDiv.innerHTML = '<div class="result-box error">Please enter an address</div>';
    return;
  }
  
  resultDiv.innerHTML = '<div class="result-box">🔍 Searching...</div>';
  
  try {
    const location = await geocodeAddress(address);
    const distFromHQ = calculateDistance(HQ[0], HQ[1], location.lat, location.lng);
    const neighborhood = findNearestNeighborhood(location.lat, location.lng);
    
    // Add marker to map
    L.marker([location.lat, location.lng], {
      icon: L.divIcon({
        className: 'search-marker',
        html: '<div style="background:#e94560;width:20px;height:20px;border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>',
        iconSize: [20, 20]
      })
    }).addTo(map).bindPopup(`
      <strong>Search Result</strong><br>
      ${location.formatted}<br>
      <strong>Neighborhood:</strong> ${neighborhood.name}
    `).openPopup();
    
    map.setView([location.lat, location.lng], 15);
    
    resultDiv.innerHTML = `
      <div class="result-box success">
        <strong>📍 ${location.formatted}</strong><br><br>
        <strong>Neighborhood:</strong> ${neighborhood.name}<br>
        <strong>Distance from HQ:</strong> ${distFromHQ.toFixed(2)} miles<br>
        <strong>Drive Time:</strong> ~${Math.ceil(distFromHQ * 2)} minutes
      </div>
    `;
  } catch (error) {
    resultDiv.innerHTML = `
      <div class="result-box error">
        <strong>❌ Address Not Found</strong><br>
        ${error.message}
      </div>
    `;
  }
}

function filterCustomers(type) {
  currentCustomerFilter = type;
  
  // Update button styles
  document.getElementById('filterAll').style.background = type === 'ALL' ? '#666' : '#ccc';
  document.getElementById('filterAll').style.color = type === 'ALL' ? 'white' : '#666';
  document.getElementById('filterMPS').style.background = type === 'MPS' ? '#FFA000' : '#ccc';
  document.getElementById('filterMPS').style.color = type === 'MPS' ? 'white' : '#666';
  document.getElementById('filterPSDW').style.background = type === 'PSDW' ? '#1E88E5' : '#ccc';
  document.getElementById('filterPSDW').style.color = type === 'PSDW' ? 'white' : '#666';
  
  searchCustomers(document.getElementById('customerSearch').value);
}

function searchCustomers(query) {
  const resultsDiv = document.getElementById('customerResults');
  
  if (!window.CUSTOMERS) {
    resultsDiv.style.display = 'none';
    return;
  }
  
  // Clear markers
  customerMarkers.forEach(m => map.removeLayer(m));
  customerMarkers = [];
  
  if (!query && currentCustomerFilter === 'ALL') {
    resultsDiv.style.display = 'none';
    return;
  }
  
  // Filter customers
  const filtered = CUSTOMERS.filter(c => {
    const matchesType = currentCustomerFilter === 'ALL' || c.type === currentCustomerFilter;
    const matchesQuery = !query || 
                        c.name.toLowerCase().includes(query.toLowerCase()) ||
                        c.neighborhood.toLowerCase().includes(query.toLowerCase());
    return matchesType && matchesQuery;
  });
  
  if (filtered.length === 0) {
    resultsDiv.innerHTML = '<div class="empty-state">No customers found</div>';
    resultsDiv.style.display = 'block';
    return;
  }
  
  // Show results
  const displayLimit = 50;
  resultsDiv.innerHTML = filtered.slice(0, displayLimit).map(c => `
    <div class="list-item" onclick="zoomToCustomer(${c.lat}, ${c.lng}, '${c.name.replace(/'/g, "\\'")}')">
      <span class="customer-type ${c.type.toLowerCase()}">${c.type}</span>
      <strong>${c.name}</strong><br>
      <small style="color: #666;">${c.neighborhood}</small>
    </div>
  `).join('');
  
  if (filtered.length > displayLimit) {
    resultsDiv.innerHTML += `<div class="info-text">Showing ${displayLimit} of ${filtered.length}</div>`;
  }
  
  resultsDiv.style.display = 'block';
  
  // Show on map if <= 100
  if (filtered.length <= 100) {
    filtered.forEach(c => {
      const color = c.type === 'MPS' ? '#FFA000' : '#1E88E5';
      const marker = L.circleMarker([c.lat, c.lng], {
        radius: 6,
        fillColor: color,
        color: 'white',
        weight: 2,
        fillOpacity: 0.8
      }).addTo(map).bindPopup(`
        <strong>${c.name}</strong><br>
        <span style="color:${color}">${c.type}</span><br>
        ${c.neighborhood}
      `);
      customerMarkers.push(marker);
    });
  }
}

function zoomToCustomer(lat, lng, name) {
  map.setView([lat, lng], 16);
  customerMarkers.forEach(m => {
    const pos = m.getLatLng();
    if (Math.abs(pos.lat - lat) < 0.0001 && Math.abs(pos.lng - lng) < 0.0001) {
      m.openPopup();
    }
  });
}

// ============== MULTI-GROOMER ROUTE MANAGEMENT ==============
function switchGroomer() {
  currentGroomer = document.getElementById('groomerSelect').value;
  updateRouteDisplay();
}

function addToRoute(name, lat, lng) {
  groomerRoutes[currentGroomer].push({ name, lat, lng });
  updateRouteDisplay();
  updateAllGroomersSummary();
}

function removeFromRoute(index) {
  groomerRoutes[currentGroomer].splice(index, 1);
  updateRouteDisplay();
  updateAllGroomersSummary();
}

function clearRoute() {
  if (confirm(`Clear all stops for ${groomerNames[currentGroomer]}?`)) {
    groomerRoutes[currentGroomer] = [];
    updateRouteDisplay();
    updateAllGroomersSummary();
  }
}

function optimizeRoute() {
  const stops = groomerRoutes[currentGroomer];
  if (stops.length < 2) return;
  
  // Simple nearest-neighbor optimization starting from HQ
  const optimized = [];
  let current = { lat: HQ[0], lng: HQ[1] };
  const remaining = [...stops];
  
  while (remaining.length > 0) {
    let nearestIdx = 0;
    let nearestDist = Infinity;
    
    remaining.forEach((stop, idx) => {
      const dist = calculateDistance(current.lat, current.lng, stop.lat, stop.lng);
      if (dist < nearestDist) {
        nearestDist = dist;
        nearestIdx = idx;
      }
    });
    
    const nearest = remaining.splice(nearestIdx, 1)[0];
    optimized.push(nearest);
    current = nearest;
  }
  
  groomerRoutes[currentGroomer] = optimized;
  updateRouteDisplay();
}

function updateRouteDisplay() {
  const container = document.getElementById('routeStops');
  const clearBtn = document.getElementById('clearRouteBtn');
  const optimizeBtn = document.getElementById('optimizeBtn');
  const stops = groomerRoutes[currentGroomer];
  
  if (stops.length === 0) {
    container.innerHTML = '<div class="empty-state">Click neighborhoods to add stops</div>';
    clearBtn.style.display = 'none';
    optimizeBtn.style.display = 'none';
    document.getElementById('stopCount').textContent = '0';
    document.getElementById('totalMiles').textContent = '0';
    document.getElementById('driveTime').textContent = '0';
    return;
  }
  
  // Calculate total distance
  let totalMiles = 0;
  for (let i = 0; i < stops.length; i++) {
    const from = i === 0 ? [HQ[0], HQ[1]] : [stops[i-1].lat, stops[i-1].lng];
    const to = [stops[i].lat, stops[i].lng];
    totalMiles += calculateDistance(from[0], from[1], to[0], to[1]);
  }
  
  // Add return to HQ
  if (stops.length > 0) {
    const lastStop = stops[stops.length - 1];
    totalMiles += calculateDistance(lastStop.lat, lastStop.lng, HQ[0], HQ[1]);
  }
  
  // Estimate drive time (assuming 30 mph average with stops)
  const driveTime = (totalMiles / 30) + (stops.length * 0.5); // 30 min per stop
  
  container.innerHTML = stops.map((stop, i) => `
    <div class="route-stop">
      <div>
        <strong>${i + 1}.</strong> ${stop.name}
      </div>
      <span class="stop-remove" onclick="removeFromRoute(${i})">×</span>
    </div>
  `).join('');
  
  clearBtn.style.display = 'inline-block';
  optimizeBtn.style.display = stops.length > 1 ? 'inline-block' : 'none';
  document.getElementById('stopCount').textContent = stops.length;
  document.getElementById('totalMiles').textContent = totalMiles.toFixed(1);
  document.getElementById('driveTime').textContent = driveTime.toFixed(1);
}

function updateAllGroomersSummary() {
  const container = document.getElementById('allGroomersSummary');
  
  let totalStops = 0;
  let totalMiles = 0;
  let summaryHTML = '<div style="font-size: 12px; color: #666; margin-bottom: 8px;">All Groomers:</div>';
  
  Object.keys(groomerRoutes).forEach(groomer => {
    const stops = groomerRoutes[groomer];
    if (stops.length === 0) return;
    
    let miles = 0;
    for (let i = 0; i < stops.length; i++) {
      const from = i === 0 ? [HQ[0], HQ[1]] : [stops[i-1].lat, stops[i-1].lng];
      const to = [stops[i].lat, stops[i].lng];
      miles += calculateDistance(from[0], from[1], to[0], to[1]);
    }
    // Add return to HQ
    if (stops.length > 0) {
      const lastStop = stops[stops.length - 1];
      miles += calculateDistance(lastStop.lat, lastStop.lng, HQ[0], HQ[1]);
    }
    
    totalStops += stops.length;
    totalMiles += miles;
    
    const color = groomer === currentGroomer ? '#FFA000' : '#666';
    summaryHTML += `
      <div style="display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f5f5f5;">
        <span style="font-size: 13px; font-weight: ${groomer === currentGroomer ? 'bold' : 'normal'}; color: ${color};">
          ${groomerNames[groomer]}
        </span>
        <span style="font-size: 12px; color: #666;">
          ${stops.length} stops, ${miles.toFixed(1)} mi
        </span>
      </div>
    `;
  });
  
  if (totalStops === 0) {
    container.innerHTML = '';
    return;
  }
  
  summaryHTML += `
    <div style="margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 4px; font-size: 13px;">
      <strong>Total:</strong> ${totalStops} stops, ${totalMiles.toFixed(1)} miles
    </div>
  `;
  
  container.innerHTML = summaryHTML;
}

function exportRoutes() {
  let exportText = `Woofies Route Plan - ${new Date().toLocaleDateString()}\n\n`;
  
  Object.keys(groomerRoutes).forEach(groomer => {
    const stops = groomerRoutes[groomer];
    if (stops.length === 0) return;
    
    exportText += `${groomerNames[groomer]}:\n`;
    exportText += `Starting from HQ (201 S Wilcox St, Castle Rock, CO 80104)\n\n`;
    
    stops.forEach((stop, i) => {
      exportText += `${i + 1}. ${stop.name}\n`;
    });
    
    exportText += `\nReturn to HQ\n`;
    
    // Calculate stats
    let miles = 0;
    for (let i = 0; i < stops.length; i++) {
      const from = i === 0 ? [HQ[0], HQ[1]] : [stops[i-1].lat, stops[i-1].lng];
      const to = [stops[i].lat, stops[i].lng];
      miles += calculateDistance(from[0], from[1], to[0], to[1]);
    }
    if (stops.length > 0) {
      const lastStop = stops[stops.length - 1];
      miles += calculateDistance(lastStop.lat, lastStop.lng, HQ[0], HQ[1]);
    }
    
    exportText += `\nTotal: ${stops.length} stops, ${miles.toFixed(1)} miles\n\n`;
    exportText += '-------------------\n\n';
  });
  
  // Copy to clipboard
  navigator.clipboard.writeText(exportText).then(() => {
    alert('Routes copied to clipboard!');
  }).catch(() => {
    // Fallback: show in alert
    alert(exportText);
  });
}

// ============== NEIGHBORHOOD FILTERING ==============
function buildNeighborhoodList() {
  const container = document.getElementById('neighborhoodList');
  const counter = document.getElementById('neighborhoodCount');
  
  counter.textContent = `${NEIGHBORHOODS.length} neighborhoods loaded ✓`;
  counter.style.color = '#2E7D32';
  
  container.innerHTML = NEIGHBORHOODS.map(n => `
    <div class="list-item" onclick="addToRoute('${n.name.replace(/'/g, "\\'")}', ${n.lat}, ${n.lng})">
      <strong>${n.name}</strong><br>
      <small style="color: ${REGION_COLORS[n.region]};">${n.region.toUpperCase()}</small>
    </div>
  `).join('');
}

function filterNeighborhoods(query) {
  const container = document.getElementById('neighborhoodList');
  const counter = document.getElementById('neighborhoodCount');
  
  if (!query) {
    buildNeighborhoodList();
    return;
  }
  
  const filtered = NEIGHBORHOODS.filter(n => 
    n.name.toLowerCase().includes(query.toLowerCase()) ||
    n.region.toLowerCase().includes(query.toLowerCase())
  );
  
  counter.textContent = `Showing ${filtered.length} of ${NEIGHBORHOODS.length}`;
  counter.style.color = filtered.length > 0 ? '#1565C0' : '#C62828';
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No neighborhoods found</div>';
    return;
  }
  
  container.innerHTML = filtered.map(n => `
    <div class="list-item" onclick="addToRoute('${n.name.replace(/'/g, "\\'")}', ${n.lat}, ${n.lng})">
      <strong>${n.name}</strong><br>
      <small style="color: ${REGION_COLORS[n.region]};">${n.region.toUpperCase()}</small>
    </div>
  `).join('');
}
